<h2>Cashier Orders</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Order ID</th>
        <th>Table</th>
        <th>Total Amount</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.table_id }}</td>
        <td>{{ order.total_amount }}</td>
        <td>{{ order.status }}</td>
        <td>
            <a href="{{ url_for('complete_payment', order_id=order.id) }}">
                Complete Payment
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="{{ url_for('cashier_dashboard') }}">Back</a>
